<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/stile.css">
    <title>Contato - Diosnei.Dev</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Voltar</a>
        </div>
    </nav>

    <main class="container my-5 contact-container">
        <section class="card-custom p-4 p-sm-5">
            <h1 class="h2 fw-bold mb-3 text-center">Entre em contato</h1>
            <p class="text-secondary text-center mb-4">Tem alguma proposta de projeto ou oportunidade? Deixe sua mensagem.</p>

            <form>
                <div class="mb-3">
                    <label for="nome" class="form-label small text-secondary">Seu nome</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="nome" name="nome" autocomplete="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label small text-secondary">E-mail para retorno</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email" name="email" autocomplete="email" required>
                </div>
                <div class="mb-3">
                    <label for="mensagem" class="form-label small text-secondary">Mensagem</label>
                    <textarea class="form-control bg-dark text-white border-secondary" id="mensagem" name="mensagem" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-purple w-100 py-2 mt-2">Enviar mensagem</button>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
